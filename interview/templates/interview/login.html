{% extends 'interview/base.html' %}

{% block title %}Sign In - Interview Coach Pro{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        
        <!-- Welcome Title -->
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">
                Welcome Back
            </h2>
            <p class="mt-2 text-sm text-slate-500">
                Sign in to resume your practice sessions
            </p>
        </div>

        <!-- Glassmorphism Login Card -->
        <div class="glass-card premium-shadow rounded-3xl p-8 sm:p-10">
            <form class="space-y-6" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                
                <div>
                    <label for="id_username" class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">
                        Username
                    </label>
                    <div class="relative rounded-2xl shadow-sm">
                        <input id="id_username" name="username" type="text" required 
                               class="block w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm placeholder-slate-400 text-slate-900 bg-white focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all duration-200" 
                               placeholder="Enter your username">
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="id_password" class="block text-xs font-semibold uppercase tracking-wider text-slate-500">
                            Password
                        </label>
                    </div>
                    <div class="relative rounded-2xl shadow-sm">
                        <input id="id_password" name="password" type="password" required 
                               class="block w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm placeholder-slate-400 text-slate-900 bg-white focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all duration-200" 
                               placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <button type="submit" 
                            class="flex w-full justify-center items-center rounded-2xl bg-gradient-to-r from-purple-600 to-indigo-600 py-3.5 px-4 text-sm font-semibold text-white shadow-md hover:opacity-95 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 hover:shadow-lg transition-all duration-200">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="mt-8 border-t border-slate-100 pt-6 text-center text-xs text-slate-500">
                New to the platform? 
                <a href="{% url 'signup' %}" class="font-semibold text-purple-600 hover:text-purple-700 transition-colors duration-150">
                    Create an account
                </a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
